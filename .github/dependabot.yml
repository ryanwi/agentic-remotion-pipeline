version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Remotion packages must move in lockstep — update them together.
      remotion:
        patterns:
          - "remotion"
          - "@remotion/*"
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "remotion"
          - "@remotion/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
